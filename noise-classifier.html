<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Noise Classifier — Gravificer</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #04060a;
    --cyan: #00ffff;
    --magenta: #ff0080;
    --amber: #ffaa00;
    --purple: #aa55ff;
    --surface: rgba(255,255,255,0.03);
    --border: rgba(0,255,255,0.15);
    --text: #e0e8f0;
    --muted: rgba(224,232,240,0.55);
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  body {
    position: relative;
    overflow-x: hidden;
  }

  /* Grid + scanline backgrounds */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.025) 1px, transparent 1px);
    background-size: 36px 36px;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 3px,
      rgba(0,0,0,0.10) 3px, rgba(0,0,0,0.10) 4px
    );
    pointer-events: none;
    z-index: 0;
  }

  /* Nav bar */
  .nav {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(4,6,10,0.92);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    border-bottom: 1px solid rgba(0,255,255,0.1);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .nav-brand {
    font-family: 'Orbitron', monospace;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 3px;
    color: var(--cyan);
    text-decoration: none;
    text-shadow: 0 0 12px rgba(0,255,255,0.4);
  }

  .nav-back {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 2px;
    color: rgba(0,255,255,0.5);
    text-decoration: none;
    border: 1px solid rgba(0,255,255,0.2);
    padding: 6px 12px;
    border-radius: 3px;
    transition: all 0.2s;
  }

  .nav-back:active { background: rgba(0,255,255,0.1); color: var(--cyan); }

  /* Main layout */
  .main {
    position: relative;
    z-index: 1;
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 16px 60px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 28px;
  }

  .eyebrow {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,255,255,0.6);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .title {
    font-family: 'Orbitron', monospace;
    font-size: clamp(20px, 6vw, 26px);
    font-weight: 900;
    color: #fff;
    letter-spacing: 2px;
    line-height: 1.1;
    text-shadow: 0 0 24px rgba(255,0,128,0.5), 0 0 48px rgba(0,255,255,0.2);
  }

  .title span { color: var(--magenta); }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0,255,255,0.4);
    letter-spacing: 2px;
    margin-top: 8px;
  }

  /* Mode toggle */
  .mode-toggle {
    display: grid;
    grid-template-columns: 1fr 1fr;
    border: 1px solid rgba(0,255,255,0.2);
    border-radius: 6px;
    overflow: hidden;
    margin-bottom: 20px;
  }

  .mode-btn {
    background: transparent;
    border: none;
    border-right: 1px solid rgba(0,255,255,0.2);
    color: rgba(0,255,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    padding: 14px 8px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
  }

  .mode-btn:last-child { border-right: none; }

  .mode-btn.active {
    background: rgba(0,255,255,0.1);
    color: var(--cyan);
    text-shadow: 0 0 8px rgba(0,255,255,0.5);
  }

  /* Input panels */
  .input-panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    margin-bottom: 14px;
  }

  .input-panel.hidden { display: none; }

  .field-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--magenta);
    text-transform: uppercase;
    margin-bottom: 8px;
    opacity: 0.9;
  }

  .nc-textarea {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,255,0.18);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    line-height: 1.75;
    padding: 14px;
    resize: none;
    min-height: 130px;
    outline: none;
    transition: border-color 0.2s;
    -webkit-appearance: none;
  }

  .nc-textarea:focus { border-color: rgba(0,255,255,0.45); }

  .nc-input {
    width: 100%;
    background: rgba(0,0,0,0.5);
    border: 1px solid rgba(0,255,255,0.18);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    padding: 14px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    -webkit-appearance: none;
    height: 48px;
  }

  .nc-input:last-of-type { margin-bottom: 0; }
  .nc-input:focus { border-color: rgba(0,255,255,0.45); }

  /* Analyze button */
  .analyze-btn {
    width: 100%;
    background: linear-gradient(135deg, rgba(255,0,128,0.18), rgba(0,255,255,0.08));
    border: 1px solid rgba(255,0,128,0.55);
    border-radius: 8px;
    color: #fff;
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 3px;
    padding: 18px;
    cursor: pointer;
    text-transform: uppercase;
    transition: all 0.2s;
    -webkit-tap-highlight-color: transparent;
    min-height: 56px;
  }

  .analyze-btn:active:not(:disabled) {
    background: linear-gradient(135deg, rgba(255,0,128,0.35), rgba(0,255,255,0.18));
    box-shadow: 0 0 24px rgba(255,0,128,0.35);
    transform: scale(0.98);
  }

  .analyze-btn:disabled { opacity: 0.38; cursor: not-allowed; }

  /* Error */
  .error-msg {
    background: rgba(255,0,80,0.1);
    border: 1px solid rgba(255,0,80,0.3);
    border-radius: 6px;
    padding: 14px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: #ff5080;
    text-align: center;
    display: none;
    margin-top: 12px;
    line-height: 1.6;
  }

  .error-msg.visible { display: block; }

  /* Loading */
  .loading-state {
    text-align: center;
    padding: 32px 16px;
    display: none;
  }

  .loading-state.visible { display: block; }

  .loading-bar {
    width: 100%;
    height: 2px;
    background: rgba(0,255,255,0.08);
    border-radius: 1px;
    overflow: hidden;
    margin: 16px 0 12px;
  }

  .loading-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--magenta), var(--cyan));
    border-radius: 1px;
    animation: scanLoad 2.2s ease-in-out infinite;
  }

  @keyframes scanLoad {
    0%   { width: 0%;  margin-left: 0; }
    50%  { width: 55%; margin-left: 25%; }
    100% { width: 0%;  margin-left: 100%; }
  }

  .loading-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: rgba(0,255,255,0.55);
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* Divider */
  .divider {
    border: none;
    border-top: 1px solid rgba(0,255,255,0.1);
    margin: 24px 0;
  }

  /* Section label */
  .section-label {
    font-family: 'Orbitron', monospace;
    font-size: 9px;
    letter-spacing: 3px;
    color: rgba(0,255,255,0.55);
    text-transform: uppercase;
    margin-bottom: 16px;
  }

  /* Output section */
  .output-section { display: none; }
  .output-section.visible { display: block; }

  /* Score ring block */
  .score-block {
    display: flex;
    align-items: center;
    gap: 18px;
    margin-bottom: 8px;
  }

  .ring-wrap {
    position: relative;
    width: 96px;
    height: 96px;
    flex-shrink: 0;
  }

  .ring-wrap svg { transform: rotate(-90deg); }

  .ring-center {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
  }

  .ring-pct {
    font-family: 'Orbitron', monospace;
    font-size: 22px;
    font-weight: 900;
    color: #fff;
    line-height: 1;
  }

  .ring-lbl {
    font-family: 'Share Tech Mono', monospace;
    font-size: 8px;
    color: rgba(255,255,255,0.38);
    letter-spacing: 1px;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .score-meta { flex: 1; min-width: 0; }

  .score-verdict {
    font-family: 'Orbitron', monospace;
    font-size: 13px;
    font-weight: 700;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .score-desc {
    font-family: 'Exo 2', sans-serif;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.65;
  }

  /* Category bars */
  .cat-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin-bottom: 4px;
  }

  .cat-row { display: flex; flex-direction: column; gap: 5px; }

  .cat-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .cat-name {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--text);
    letter-spacing: 0.5px;
  }

  .cat-count {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    font-weight: 700;
  }

  .cat-bar-bg {
    height: 5px;
    background: rgba(255,255,255,0.05);
    border-radius: 3px;
    overflow: hidden;
  }

  .cat-bar-fill {
    height: 100%;
    border-radius: 3px;
    width: 0%;
    transition: width 0.9s cubic-bezier(0.22, 1, 0.36, 1);
  }

  /* Flagged phrases */
  .flags-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 4px;
  }

  .flag-item {
    background: rgba(255,255,255,0.03);
    border-left: 3px solid;
    border-radius: 0 6px 6px 0;
    padding: 12px 14px;
  }

  .flag-phrase {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    margin-bottom: 4px;
    line-height: 1.5;
  }

  .flag-type {
    font-family: 'Exo 2', sans-serif;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* Removal actions */
  .removal-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .removal-item {
    display: flex;
    gap: 12px;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,170,0,0.2);
    border-radius: 6px;
    padding: 14px;
    align-items: flex-start;
  }

  .removal-icon {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    color: var(--amber);
    min-width: 22px;
    padding-top: 1px;
    flex-shrink: 0;
  }

  .removal-text {
    font-family: 'Exo 2', sans-serif;
    font-size: 13px;
    color: rgba(224,232,240,0.85);
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid rgba(0,255,255,0.08);
  }

  .footer-brand {
    font-family: 'Orbitron', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,255,255,0.25);
  }

  .footer-brand span { color: rgba(255,0,128,0.35); }
</style>
</head>
<body>

<nav class="nav">
  <a class="nav-brand" href="index.html">GRAVIFICER</a>
  <a class="nav-back" href="index.html">◂ HUB</a>
</nav>

<main class="main">
  <div class="header">
    <div class="eyebrow">▸ INSTRUMENT 02</div>
    <h1 class="title">NOISE <span>CLASSIFIER</span></h1>
    <div class="subtitle">DETECT · CATEGORIZE · REMOVE</div>
  </div>

  <div class="mode-toggle">
    <button class="mode-btn active" id="btn-freeform" onclick="setMode('freeform')">FREE-FORM</button>
    <button class="mode-btn" id="btn-structured" onclick="setMode('structured')">STRUCTURED</button>
  </div>

  <div class="input-panel" id="panel-freeform">
    <div class="field-label">▸ PASTE INPUT</div>
    <textarea class="nc-textarea" id="input-freeform"
      placeholder="Paste any text — headline, paragraph, strategy, brief, pitch, concept..."></textarea>
  </div>

  <div class="input-panel hidden" id="panel-structured">
    <div class="field-label">▸ HEADLINE</div>
    <input class="nc-input" id="input-headline" placeholder="Your headline or title..." type="text" />
    <div class="field-label">▸ BODY</div>
    <textarea class="nc-textarea" id="input-body"
      placeholder="Body copy, description, or main content..." style="min-height:100px; margin-bottom:14px;"></textarea>
    <div class="field-label">▸ CTA / CLOSER</div>
    <input class="nc-input" id="input-cta" placeholder="Call to action or closing statement..." type="text" style="margin-bottom:0;" />
  </div>

  <button class="analyze-btn" id="analyze-btn" onclick="runAnalysis()">▸ CLASSIFY NOISE</button>
  <div class="error-msg" id="error-msg"></div>

  <div class="loading-state" id="loading-state">
    <div class="loading-bar"><div class="loading-fill"></div></div>
    <div class="loading-label" id="loading-label">SCANNING FOR NOISE...</div>
  </div>

  <div class="output-section" id="output-section">
    <hr class="divider">

    <div class="section-label">▸ SIGNAL / NOISE RATIO</div>
    <div class="score-block">
      <div class="ring-wrap">
        <svg width="96" height="96" viewBox="0 0 96 96" xmlns="http://www.w3.org/2000/svg">
          <circle cx="48" cy="48" r="40" fill="none" stroke="rgba(255,255,255,0.05)" stroke-width="7"/>
          <circle id="ring-signal" cx="48" cy="48" r="40" fill="none"
            stroke="#00ffff" stroke-width="7" stroke-linecap="round"
            stroke-dasharray="251.33" stroke-dashoffset="251.33"
            style="transition: stroke-dashoffset 1s cubic-bezier(0.22,1,0.36,1); filter: drop-shadow(0 0 6px rgba(0,255,255,0.5))"/>
          <circle cx="48" cy="48" r="28" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="5"/>
          <circle id="ring-noise" cx="48" cy="48" r="28" fill="none"
            stroke="#ff0080" stroke-width="5" stroke-linecap="round"
            stroke-dasharray="175.93" stroke-dashoffset="175.93"
            style="transition: stroke-dashoffset 1s cubic-bezier(0.22,1,0.36,1) 0.15s; filter: drop-shadow(0 0 6px rgba(255,0,128,0.5))"/>
        </svg>
        <div class="ring-center">
          <div class="ring-pct" id="ring-pct">—</div>
          <div class="ring-lbl">SIGNAL</div>
        </div>
      </div>
      <div class="score-meta">
        <div class="score-verdict" id="score-verdict">—</div>
        <div class="score-desc" id="score-desc"></div>
      </div>
    </div>

    <hr class="divider">
    <div class="section-label">▸ NOISE CATEGORIES</div>
    <div class="cat-grid" id="cat-grid"></div>

    <hr class="divider">
    <div class="section-label">▸ FLAGGED PHRASES</div>
    <div class="flags-list" id="flags-list"></div>

    <hr class="divider">
    <div class="section-label">▸ REMOVAL ACTIONS</div>
    <div class="removal-list" id="removal-list"></div>
  </div>

  <div class="footer">
    <div class="footer-brand">GRAVIFI<span>CER</span> · INSTRUMENT 02</div>
  </div>
</main>

<script>
const CAT_COLORS = {
  'Filler':          '#00ffff',
  'Filler/Padding':  '#00ffff',
  'Vague Language':  '#ff0080',
  'Vague/Abstract':  '#ff0080',
  'Redundancy':      '#ffaa00',
  'Generic Framing': '#aa55ff',
  'Overload':        '#ff5500',
};

function catColor(name) {
  if (CAT_COLORS[name]) return CAT_COLORS[name];
  const vals = Object.values(CAT_COLORS);
  return vals[Math.abs(hashStr(name)) % vals.length];
}

function hashStr(s) {
  let h = 0;
  for (let i = 0; i < s.length; i++) h = (Math.imul(31,h) + s.charCodeAt(i)) | 0;
  return h;
}

let currentMode = 'freeform';

function setMode(mode) {
  currentMode = mode;
  document.getElementById('btn-freeform').classList.toggle('active', mode === 'freeform');
  document.getElementById('btn-structured').classList.toggle('active', mode === 'structured');
  document.getElementById('panel-freeform').classList.toggle('hidden', mode !== 'freeform');
  document.getElementById('panel-structured').classList.toggle('hidden', mode !== 'structured');
}

function getInputText() {
  if (currentMode === 'freeform') {
    return document.getElementById('input-freeform').value.trim();
  }
  const parts = [];
  const h = document.getElementById('input-headline').value.trim();
  const b = document.getElementById('input-body').value.trim();
  const c = document.getElementById('input-cta').value.trim();
  if (h) parts.push('HEADLINE: ' + h);
  if (b) parts.push('BODY: ' + b);
  if (c) parts.push('CTA: ' + c);
  return parts.join('\n\n');
}

function setLoading(on, msg) {
  document.getElementById('loading-state').classList.toggle('visible', on);
  document.getElementById('analyze-btn').disabled = on;
  if (msg) document.getElementById('loading-label').textContent = msg;
}

function showError(msg) {
  const el = document.getElementById('error-msg');
  el.textContent = msg;
  el.classList.add('visible');
}

function hideError() {
  document.getElementById('error-msg').classList.remove('visible');
}

const SYSTEM = `You are the Gravificer Noise Classifier — a precision instrument for detecting noise in written communication.

Gravificer philosophy: Every output must clarify, reveal, or reframe — otherwise it is noise.

Analyze the input and return ONLY a valid JSON object — no markdown, no backticks, no preamble:

{
  "signal_score": <integer 0-100>,
  "verdict": "<4-6 word sharp assessment>",
  "description": "<1-2 sentences on the signal condition>",
  "categories": [
    { "name": "<category>", "count": <integer> }
  ],
  "flagged": [
    { "phrase": "<exact or near-exact phrase>", "type": "<category>", "reason": "<short reason>" }
  ],
  "removals": [
    "<specific actionable removal or rewrite instruction>"
  ]
}

Noise categories (only include what is present):
- Filler: zero-meaning words (e.g. "very," "really," "it is important to note")
- Vague Language: non-specific abstractions (e.g. "leverage," "synergy," "world-class," "innovative")
- Redundancy: same idea repeated in different words
- Generic Framing: could-apply-to-anything openers/closers (e.g. "In today's fast-paced world")
- Overload: too many ideas in one sentence, fragmenting signal

Return 3–6 flagged phrases. Return 3–5 specific removal actions. Be surgical and direct.`;

async function runAnalysis() {
  hideError();
  const text = getInputText();
  if (!text) { showError('No input detected. Paste content to classify.'); return; }

  document.getElementById('output-section').classList.remove('visible');
  setLoading(true, 'SCANNING FOR NOISE...');

  const msgs = ['MAPPING SIGNAL PATTERNS...','ISOLATING NOISE CATEGORIES...','GENERATING REMOVAL ACTIONS...'];
  let mi = 0;
  const timer = setInterval(() => {
    mi = (mi + 1) % msgs.length;
    document.getElementById('loading-label').textContent = msgs[mi];
  }, 1900);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: SYSTEM,
        messages: [{ role: 'user', content: 'Analyze:\n\n' + text }]
      })
    });

    clearInterval(timer);
    setLoading(false);
    if (!res.ok) throw new Error('API ' + res.status);

    const data = await res.json();
    const raw = data.content.map(b => b.text || '').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    render(JSON.parse(clean));
  } catch(e) {
    clearInterval(timer);
    setLoading(false);
    showError('Classification failed. Check your connection and try again.');
    console.error(e);
  }
}

function render(d) {
  const sig = Math.min(100, Math.max(0, d.signal_score || 0));
  const noise = 100 - sig;

  // Rings
  const co = 251.33, ci = 175.93;
  document.getElementById('ring-pct').textContent = sig + '%';
  setTimeout(() => {
    document.getElementById('ring-signal').style.strokeDashoffset = co * (1 - sig / 100);
    document.getElementById('ring-noise').style.strokeDashoffset = ci * (1 - noise / 100);
  }, 80);

  // Verdict
  const vColor = sig >= 70 ? '#00ffff' : sig >= 45 ? '#ffaa00' : '#ff0080';
  const vEl = document.getElementById('score-verdict');
  vEl.textContent = d.verdict || '—';
  vEl.style.color = vColor;
  document.getElementById('score-desc').textContent = d.description || '';

  // Categories
  const cats = d.categories || [];
  const maxC = cats.reduce((m, c) => Math.max(m, c.count), 1);
  const grid = document.getElementById('cat-grid');
  grid.innerHTML = '';
  cats.forEach(cat => {
    const col = catColor(cat.name);
    const pct = Math.round((cat.count / maxC) * 100);
    const row = document.createElement('div');
    row.className = 'cat-row';
    row.innerHTML = `
      <div class="cat-header">
        <span class="cat-name">${cat.name.toUpperCase()}</span>
        <span class="cat-count" style="color:${col}">${cat.count} instance${cat.count !== 1 ? 's' : ''}</span>
      </div>
      <div class="cat-bar-bg">
        <div class="cat-bar-fill" style="background:${col};" data-pct="${pct}"></div>
      </div>`;
    grid.appendChild(row);
  });
  setTimeout(() => {
    grid.querySelectorAll('.cat-bar-fill').forEach(el => {
      el.style.width = el.dataset.pct + '%';
    });
  }, 120);

  // Flagged
  const flagsList = document.getElementById('flags-list');
  flagsList.innerHTML = '';
  (d.flagged || []).forEach(f => {
    const col = catColor(f.type);
    const item = document.createElement('div');
    item.className = 'flag-item';
    item.style.borderLeftColor = col;
    item.innerHTML = `
      <div class="flag-phrase" style="color:${col}">"${f.phrase}"</div>
      <div class="flag-type">${f.type} — ${f.reason}</div>`;
    flagsList.appendChild(item);
  });

  // Removals
  const removalList = document.getElementById('removal-list');
  removalList.innerHTML = '';
  (d.removals || []).forEach((r, i) => {
    const item = document.createElement('div');
    item.className = 'removal-item';
    item.innerHTML = `
      <div class="removal-icon">R${i + 1}</div>
      <div class="removal-text">${r}</div>`;
    removalList.appendChild(item);
  });

  document.getElementById('output-section').classList.add('visible');
  document.getElementById('output-section').scrollIntoView({ behavior: 'smooth', block: 'start' });
}
</script>
</body>
</html>
